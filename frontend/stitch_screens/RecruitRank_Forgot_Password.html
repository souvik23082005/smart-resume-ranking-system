<style>
        .glass-panel {
            background: rgba(11, 14, 20, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        
        .mesh-bg {
            background: radial-gradient(circle at 15% 50%, rgba(96, 1, 209, 0.15), transparent 25%),
                        radial-gradient(circle at 85% 30%, rgba(76, 215, 246, 0.15), transparent 25%);
            background-color: #050505;
        }

        .input-glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .input-glass:focus-within {
            border-color: #4cd7f6;
            box-shadow: 0 0 0 1px #4cd7f6, inset 0 0 15px rgba(76, 215, 246, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-primary {
            background: #6001d1;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background: #5a00c6;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3), 0 0 15px rgba(96, 1, 209, 0.4);
        }
    </style>

<body class="bg-surface-container-lowest text-on-surface min-h-screen flex items-center justify-center font-body-md mesh-bg antialiased selection:bg-secondary-container selection:text-white">
<!-- Ambient Glow Effects -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-secondary-container/20 blur-[120px]"></div>
<div class="absolute top-[60%] -right-[10%] w-[40%] h-[40%] rounded-full bg-tertiary/10 blur-[100px]"></div>
</div>
<!-- Main Container -->
<main class="w-full max-w-md px-margin-mobile md:px-0 z-10 relative">
<div class="glass-panel rounded-xl p-8 md:p-10 flex flex-col items-center">
<!-- Branding -->
<div class="flex items-center gap-3 mb-8">
<div class="w-10 h-10 rounded-lg bg-gradient-to-br from-secondary-container to-tertiary flex items-center justify-center shadow-lg border border-white/20">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">analytics</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">RecruitRank</h1>
</div>
<!-- Header -->
<div class="text-center mb-8 w-full">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-3">Reset Password</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-xs mx-auto">
                    Enter your email address and we'll send you instructions to reset your password.
                </p>
</div>
<!-- Form -->
<form action="#" class="w-full space-y-6" method="POST">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface block ml-1" for="email">Work Email</label>
<div class="relative input-glass rounded-lg flex items-center overflow-hidden">
<div class="pl-4 pr-3 flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full bg-transparent border-none text-on-surface font-body-md py-3 pr-4 focus:ring-0 placeholder:text-on-surface-variant/50" id="email" name="email" placeholder="name@company.com" required="" type="email">
</div>
</div>
<!-- Submit Button -->
<button class="btn-primary w-full rounded-lg py-3.5 px-6 font-label-sm text-label-sm text-white flex items-center justify-center gap-2 group" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center w-full pt-6 border-t border-white/5">
<a class="inline-flex items-center gap-2 font-label-sm text-label-sm text-on-surface-variant hover:text-tertiary transition-colors" href="#">
<span class="material-symbols-outlined text-[16px]">arrow_back</span>
<span>Back to Sign In</span>
</a>
</div>
</div>
</main>
