<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_19 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_19" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_19');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const container = document.getElementById('threejs-container') || document.body;
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Resume Geometry (A4 Paper Aspect Ratio)
const geometry = new THREE.PlaneGeometry(3.5, 5);
const material = new THREE.MeshPhongMaterial({ 
    color: 0xffffff, 
    side: THREE.DoubleSide,
    shininess: 100
});

const resume = new THREE.Mesh(geometry, material);
scene.add(resume);

// Simple Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);
const pointLight = new THREE.PointLight(0x00D1FF, 1, 10);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

camera.position.z = 7;

// Mouse Tracking
let mouseX = 0;
let mouseY = 0;
window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
    mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
});

// Scroll Tracking
let scrollY = 0;
window.addEventListener('scroll', () => {
    scrollY = window.scrollY;
});

function animate() {
    requestAnimationFrame(animate);

    // Floating motion
    const time = Date.now() * 0.001;
    resume.position.y = Math.sin(time) * 0.2;
    resume.rotation.y = Math.sin(time * 0.5) * 0.1 + (mouseX * 0.2);
    resume.rotation.x = Math.cos(time * 0.5) * 0.05 + (mouseY * 0.2);

    // Scroll effects: Move back and fade out
    const scrollFactor = Math.min(scrollY / 500, 1);
    resume.position.z = -scrollFactor * 10;
    resume.material.opacity = 1 - scrollFactor;
    resume.material.transparent = true;

    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_19 -->
</body>
</html>
